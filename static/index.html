<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGG Evergreen Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117; color: #e2e8f0; min-height: 100vh;
    }
    header {
      background: #1a1d27; border-bottom: 1px solid #2d3148;
      padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: .3px; color: #fff; }
    header span { font-size: 12px; color: #6b7280; }
    main { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
    h2 {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .8px; color: #6b7280; margin-bottom: 14px;
    }
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #2d3148; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead { background: #1a1d27; }
    thead th {
      padding: 11px 16px; text-align: left; font-weight: 600; color: #9ca3af;
      font-size: 12px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
    }
    tbody tr { border-top: 1px solid #1e2133; }
    tbody tr:hover { background: #1a1d27; }
    tbody td { padding: 11px 16px; white-space: nowrap; }
    th.num, td.num { text-align: right; }
    .nav-val { font-weight: 600; color: #f1f5f9; font-variant-numeric: tabular-nums; }
    .date { color: #6b7280; font-size: 12px; }
    .strategy { color: #94a3b8; }
    .state { padding: 24px 16px; font-size: 13px; }
    .loading { color: #6b7280; }
    .error { color: #f87171; }
  </style>
</head>
<body>

<header>
  <h1>SGG · Evergreen Monitor</h1>
  <span id="status">Loading…</span>
</header>

<main>
  <h2>Latest NAV per Fund</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Fund Name</th>
          <th>Strategy</th>
          <th>As Of</th>
          <th class="num">NAV / Share</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td class="state loading" colspan="4">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  function fmtStrategy(s) {
    return s ? s.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase()) : "—";
  }

  async function load() {
    const tbody = document.getElementById("tbody");
    const status = document.getElementById("status");
    try {
      const res = await fetch("/api/nav");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const navs = data.navs || [];

      if (!navs.length) {
        tbody.innerHTML = `<tr><td class="state error" colspan="4">No data returned.</td></tr>`;
        status.textContent = "No data";
        return;
      }

      tbody.innerHTML = navs.map(r => `
        <tr>
          <td><strong>${r.fund_name ?? "—"}</strong></td>
          <td class="strategy">${fmtStrategy(r.strategy)}</td>
          <td class="date">${r.as_of ?? "—"}</td>
          <td class="num nav-val">${r.nav_per_share != null ? "$" + Number(r.nav_per_share).toFixed(2) : "—"}</td>
        </tr>
      `).join("");

      const latest = navs.map(r => r.as_of).filter(Boolean).sort().pop();
      status.textContent = `${navs.length} funds · latest ${latest ?? "—"}`;
    } catch (e) {
      tbody.innerHTML = `<tr><td class="state error" colspan="4">Error loading data: ${e.message}</td></tr>`;
      status.textContent = "Error";
    }
  }

  load();
</script>

</body>
</html>
